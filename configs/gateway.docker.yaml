# Stack profile for deployments/docker-compose.yml (Redis + echo + gateway).
# For laptop-only demos without Docker Redis, use configs/gateway.dev.yaml instead.
server:
  port: 8080

redis:
  enabled: true
  addr: redis:6379

routes:
  - name: echo
    path_prefix: /api/echo
    strip_prefix: /api/echo
    timeout_ms: 3000
    rate_limit:
      enabled: true
      requests: 3
      window_seconds: 60
      key_strategy: ip
    methods:
      - GET
    upstream: http://echo-upstream:9091
